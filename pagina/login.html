<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión</title>
<link rel="stylesheet" href="css/estilos.css">
<link rel="stylesheet" href="css/login.css">

<script src="/js/login.js" defer></script>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f4f4f4;
        margin: 0;
        font-family: Arial, sans-serif;
    }

    .login-container {
        background: #fff;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 320px;
        text-align: center;
    }

    .login-container h1 {
        margin-bottom: 1.5rem;
        font-size: 1.5rem;
        color: #333;
    }

    .login-container input {
        width: 100%;
        padding: 0.6rem;
        margin: 0.5rem 0;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 1rem;
    }

    .login-container button {
        width: 100%;
        padding: 0.7rem;
        background: #0077cc;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1rem;
        margin-top: 0.5rem;
        transition: background 0.3s;
    }

    .login-container button:hover {
        background: #005fa3;
    }

    #mensajeError {
        color: red;
        margin-top: 0.5rem;
        font-size: 0.9rem;
    }
</style>
</head>
<body>
<div class="login-container">
    <h1>Iniciar Sesión</h1>
    <input type="text" id="usuario" placeholder="Usuario" autocomplete="off">
    <input type="password" id="password" placeholder="Contraseña">
    <button type="button" onclick="login()">Ingresar</button>
    <p id="mensajeError"></p>
</div>
</body>
</html>
